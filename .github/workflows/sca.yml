name: SCA
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fluidattacks/sca-action@1.2.0
        id: scan
        with:
          scanner_mode: full
          scan_config_path: .github/sca-config.yaml

      - name: Upload SCA CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fluid-attacks-sca-csv
          path: .fluidattacks-sca-results.csv