name: SAST
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 8 * * 1" # optional: weekly full scan every Monday at 8am

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fluidattacks/sast-action@1.3.0
        id: scan
        with:
          scanner_mode: full
          scan_config_path: .github/sast-config.yaml

      - name: Upload SAST CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fluid-attacks-sast-csv
          path: results-sast.csv

      - name: Fail if SAST found vulnerabilities
        if: always()
        run: |
          if [ ! -f results-sast.csv ]; then
            echo "SAST CSV was not generated"
            exit 1
          fi

          line_count=$(wc -l < results-sast.csv)
          if [ "$line_count" -gt 1 ]; then
            echo "SAST vulnerabilities found: $((line_count - 1))"
            exit 1
          fi