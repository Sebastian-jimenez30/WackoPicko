name: SECRET_SCAN
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 8 * * 1" # optional: weekly full scan every Monday at 8am

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required: full history enables differential scanning

      - uses: fluidattacks/ss-action@0.2.0 # Use latest released version
        id: scan
        with:
          scan_config_path: .github/secret-scan-config.yaml
          scanner_mode: full

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-secret-scan.csv
          path: '**/results-secret-scan.csv'

      - name: Check CSV severity and fail on threshold
        if: always()
        env:
          CSV_PATH: results-secret-scan.csv
          STRICTNESS_THRESHOLD: HIGH
        run: |
          python3 - <<'PY'
          import csv, os, sys
          order = {'INFO':0,'LOW':1,'MEDIUM':2,'HIGH':3,'CRITICAL':4}
          path = os.environ.get('CSV_PATH')
          threshold = os.environ.get('STRICTNESS_THRESHOLD','HIGH').upper()
          if not os.path.exists(path):
              print('CSV not found, assuming no findings:', path)
              sys.exit(0)
          with open(path, newline='', encoding='utf-8') as fh:
              reader = csv.reader(fh)
              headers = next(reader, None)
              if not headers:
                  print('Empty CSV')
                  sys.exit(0)
              sev_idx = None
              for i,h in enumerate(headers):
                  if 'severity' in h.lower():
                      sev_idx = i
                      break
              if sev_idx is None:
                  print('No severity column found; no failure')
                  sys.exit(0)
              fail_count = 0
              for row in reader:
                  if len(row) <= sev_idx: continue
                  v = row[sev_idx].strip().upper()
                  if v=='' : continue
                  if order.get(v,0) >= order.get(threshold,3):
                      fail_count += 1
              print(f'Findings >= {threshold}:', fail_count)
          if fail_count>0:
              sys.exit(1)
          PY

      - name: Upload SARIF
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request && github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif_file }}

      - name: Publish commit link
        if: always()
        run: |
          echo "[Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" > $GITHUB_STEP_SUMMARY
