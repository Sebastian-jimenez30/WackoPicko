name: SECRET_SCAN
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: fluidattacks/ss-action@0.2.0
        id: scan
        with:
          scanner_mode: full
          scan_config_path: .github/secret-scan-config.yaml

      - name: Upload Secret Scan CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fluid-attacks-secret-scan-csv
          path: results-secret-scan.csv

      - name: Fail if Secret Scan found vulnerabilities
        if: always()
        run: |
          if [ ! -f results-secret-scan.csv ]; then
            echo "Secret Scan CSV was not generated"
            exit 1
          fi

          line_count=$(wc -l < results-secret-scan.csv)
          if [ "$line_count" -gt 1 ]; then
            echo "Secret Scan vulnerabilities found: $((line_count - 1))"
            exit 1
          fi